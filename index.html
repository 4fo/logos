<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOGOS</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📖</text></svg>">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Rosarivo:ital@0;1&family=Baskervville:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="header">
    <div class="header-content">
      <div class="title">Logos</div>
      <div id="chapter-badge"></div>
      <div id="search-container">
        <input id="search-input" type="text" placeholder="Search scripture..." spellcheck="false">
        <button id="search-clear" aria-label="Clear search">✕</button>
        <button id="settings-btn" aria-label="Settings">
          <span id="settings-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
        </button>
    </div>
    </div>
    <div id="settings-panel">
      <div class="settings-header">
        <span class="settings-title">Settings</span>
        <button id="settings-close" aria-label="Close settings">✕</button>
      </div>
      <div class="setting-group">
        <div class="setting-row">
          <label>Theme</label>
          <div class="theme-pills">
            <button class="pill active" data-theme="system">System</button>
            <button class="pill" data-theme="light">Light</button>
            <button class="pill" data-theme="dark">Dark</button>
          </div>
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-row">
          <label>Layout</label>
          <button id="layout-toggle" class="toggle-btn">Paragraph</button>
        </div>
        <div class="setting-row">
          <label>Text size</label>
          <div class="size-controls">
            <button id="size-down">−</button>
            <span id="size-display">100%</span>
            <button id="size-up">+</button>
          </div>
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-row">
          <label>Typography</label>
          <button id="font-toggle" class="toggle-btn">Rosarivo</button>
        </div>
      </div>
    </div>
  </div>
  <div id="results"></div>
  <div id="toast">Verse copied</div>
  <script type="module" src="main.js"></script>
</body>
</html>
