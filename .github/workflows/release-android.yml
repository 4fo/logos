name: Build Android APK

on:
  push:
    branches: [android]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 2.0.0)'
        required: false
        type: string

concurrency:
  group: android-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0'

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Sync Capacitor
        run: npx cap copy android

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Rename APK
        working-directory: android/app/build/outputs/apk/release
        run: mv "LOGOS - The Holy Bible-release.apk" "LOGOS - The Holy Bible.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: LOGOS - The Holy Bible.apk
          path: android/app/build/outputs/apk/release/LOGOS - The Holy Bible.apk

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: LOGOS - The Holy Bible.apk

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VER="${{ inputs.version }}"
            echo "tag=v${VER}" >> $GITHUB_OUTPUT
            echo "name=v${VER}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
            echo "name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: LOGOS - The Holy Bible.apk
